services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: blissful
      POSTGRES_PASSWORD: ${DB_PASSWORD:-blissful_dev}
      POSTGRES_DB: blissful_soul
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blissful -d blissful_soul"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://blissful:${DB_PASSWORD:-blissful_dev}@db:5432/blissful_soul
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production-min-32-chars}
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
