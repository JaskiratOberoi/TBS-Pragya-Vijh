services:
  strapi-db:
    image: postgres:16-alpine
    volumes:
      - strapi_pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: ${STRAPI_DB_PASSWORD:-strapi_dev}
      POSTGRES_DB: strapi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  strapi:
    build: ./strapi
    depends_on:
      strapi-db:
        condition: service_healthy
    ports:
      - "1337:1337"
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: strapi-db
      DATABASE_PORT: 5432
      DATABASE_NAME: strapi
      DATABASE_USERNAME: strapi
      DATABASE_PASSWORD: ${STRAPI_DB_PASSWORD:-strapi_dev}
      JWT_SECRET: ${STRAPI_JWT_SECRET:-dev-jwt-secret-change-me}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET:-dev-admin-jwt-change-me}
      APP_KEYS: ${STRAPI_APP_KEYS:-key1,key2,key3,key4}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      COMMERCE_INTERNAL_SECRET: ${COMMERCE_INTERNAL_SECRET:-dev-commerce-secret}
      # Legacy Prisma Postgres (compose service name `db` / container blissful-soul-db-1 on same network)
      LEGACY_DATABASE_URL: ${LEGACY_DATABASE_URL:-postgresql://blissful:blissful_dev@db:5432/blissful_soul}
      IMPORT_LEGACY_CATALOG: ${IMPORT_LEGACY_CATALOG:-true}
    volumes:
      - strapi_uploads:/opt/app/public/uploads
    restart: unless-stopped

  app:
    build: .
    depends_on:
      - strapi
    environment:
      STRAPI_API_URL: http://strapi:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
      COMMERCE_INTERNAL_SECRET: ${COMMERCE_INTERNAL_SECRET:-dev-commerce-secret}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production-min-32-chars}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      CRON_SECRET: ${CRON_SECRET:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_USER_ID: ${INSTAGRAM_USER_ID:-}
      NEXT_PUBLIC_INSTAGRAM_WIDGET_SRC: ${NEXT_PUBLIC_INSTAGRAM_WIDGET_SRC:-}
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - app
      - strapi
    restart: unless-stopped

volumes:
  strapi_pgdata:
  strapi_uploads:
  uploads:
